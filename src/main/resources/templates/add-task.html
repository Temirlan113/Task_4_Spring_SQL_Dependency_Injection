<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main}">
<body>
<div layout:fragment="content">
    <div class="container mt-5">
        <h3 class="mb-4 text-info">Add New Task</h3>

        <div class="card shadow p-4" style="max-width: 600px;">
            <form th:action="@{'/add'}" method="post">
                <div class="mb-3">
                    <label for="name" class="form-label">Task Name</label>
                    <input type="text" name="name" id="name" class="form-control" placeholder="Enter task name" required>
                </div>

                <div class="mb-3">
                    <label for="deadlineDate" class="form-label">Deadline Date</label>
                    <input type="date" name="deadlineDate" id="deadlineDate" class="form-control" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" name="completed" id="completed" class="form-check-input">
                    <label class="form-check-label" for="completed">Is Completed?</label>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-info text-white">Save Task</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
