<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main}">
<body>
<div layout:fragment="content">
  <div class="p-3 mb-4 bg-info text-white rounded shadow-sm">
    <h3 class="m-0" th:href="@{/}">TASK MANAGER <small class="fw-bold ms-2 text-white-100" th:href="@{/}">All Tasks</small></h3>
  </div>

  <button type="button" class="btn btn-info text-white mb-3 shadow-sm" data-bs-toggle="modal" data-bs-target="#addTaskModal">
    + Add New Task
  </button>

  <div class="card shadow-sm">
    <table class="table table-hover mb-0">
      <thead>
      <tr>
        <th class="ps-4">ID</th>
        <th>NAME</th>
        <th>DEADLINE DATE</th>
        <th>IS COMPLETED</th>
        <th class="text-center">DETAILS</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="task : ${tasks}">
        <td class="ps-4" th:text="${task.id}"></td>
        <td th:text="${task.name}"></td>
        <td th:text="${task.deadlineDate}"></td>
        <td th:text="${task.completed} ? 'YES' : 'NO'"></td>
        <td class="text-center">
          <a th:href="@{'/details/' + ${task.id}}" class="btn btn-info btn-sm text-white px-3">DETAILS</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="modal fade" id="addTaskModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">New Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form th:action="@{'/add'}" method="post">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label text-uppercase small fw-bold">Task Name :</label>
              <input type="text" name="name" class="form-control" placeholder="Task name..." required>
            </div>
            <div class="mb-3">
              <label class="form-label text-uppercase small fw-bold">Task Description :</label>
              <textarea name="description" class="form-control" rows="4" placeholder="Description..."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label text-uppercase small fw-bold">Task Deadline Date :</label>
              <input type="date" name="deadlineDate" class="form-control" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Add Task</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
