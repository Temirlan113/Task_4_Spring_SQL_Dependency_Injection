<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{main}">
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <form th:action="@{'/save-task'}" method="post">
            <input type="hidden" name="id" th:value="${task.id}">

            <div class="mb-3">
                <label class="form-label text-uppercase small fw-bold">Task Name :</label>
                <input type="text" name="name" class="form-control" th:value="${task.name}">
            </div>

            <div class="mb-3">
                <label class="form-label text-uppercase small fw-bold">Task Description :</label>
                <textarea name="description" class="form-control" rows="5" th:text="${task.description}"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label text-uppercase small fw-bold">Task Deadline Date :</label>
                <input type="date" name="deadlineDate" class="form-control" th:value="${task.deadlineDate}">
            </div>

            <div class="mb-4">
                <label class="form-label text-uppercase small fw-bold">Completed :</label>
                <select name="completed" class="form-select">
                    <option th:value="true" th:selected="${task.completed}">YES</option>
                    <option th:value="false" th:selected="${!task.completed}">NO</option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">SAVE</button>
                <a th:href="@{'/delete/' + ${task.id}}" class="btn btn-danger px-4">DELETE</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
